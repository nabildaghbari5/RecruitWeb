<br>
<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
    <div class="d-flex gap-2">
      <button class="btn btn-add btn-primary" routerLink="/offre/ajouter_recruteur">
        &nbsp; Ajouter un recruteur
      </button>
    </div>
  </div>
</div>

<br>
<div class="datatable">
  <table class="table table-striped" *ngIf="recruteur.length > 0">
    <thead class="datatable-header">
      <tr>
        <th><strong>{{ 'ID' }}</strong></th>
        <th><strong>{{ 'Nom ' }}</strong></th>
         <th><strong>{{ 'Prénom' }}</strong></th>
          <th><strong>{{ 'email' }}</strong></th>
      
      </tr>
    </thead>
    <tbody class="text-sm">
      <tr *ngFor="let r of recruteur">
        <td>{{ r.id }}</td>
        <td>{{ r.firstname }}</td>
        <td>{{ r.lastname }}</td>
        <td>{{ r.email }}</td>
        <td class="action-buttons">
          <button class="btn btn-info btn-sm btn-rounded" (click)="edit(r.id)">
            <i class="fas fa-edit"></i>
          </button>&nbsp;
          <button class="btn btn-danger btn-sm btn-rounded" (click)="delete(r.id)">
            <i class="fas fa-trash-alt"></i>
          </button>&nbsp;
        </td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="recruteur.length === 0" class="text-center p-3">
    <p>Aucune compte recruteur disponible pour le moment.</p>
  </div>
</div>
