
<div class="row">
    <div class="col-12">
        <div class="page-title-box d-sm-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <!-- Affichage de l'image et du titre sur le même niveau -->
                <img *ngIf="image" [src]="image" alt="Image" />
                <h4 class="page-title mb-sm-0">{{ title }}</h4>
            </div>
            
            <div class="page-title-right">
                <ol class="breadcrumb m-0">
                    <li *ngFor="let item of breadcrumbItems; let i = index" class="breadcrumb-item" [class.active]="i === breadcrumbItems.length - 1">
                        {{ item.label }}
                    </li>
                </ol>
            </div>
        </div>
    </div>
</div>
<br>
