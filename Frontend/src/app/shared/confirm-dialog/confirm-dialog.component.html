<div *ngIf="message" class="modal" tabindex="-1" role="dialog" style="display:block!important">
  <div class="modal-dialog custom-modal" role="document">
    <div class="modal-content">

      <div *ngIf="message?.type === 'confirm'" class="modal-body">
        <!-- Close Button -->
        <div class="d-flex justify-content-end px-2 pb-2">
          <i
            [title]="'Fermer'"
            (click)="message.cancel()"
            class="zmdi zmdi-close close-modal-icon"
          ></i>
        </div>
        <!-- Confirmation Message -->
        <div class="row">
          <div class="col-md-12 pb-3 text-center confirm-message">
            <div>
              <img src="assets/images/check-out.png" alt="image" width="100" height="100">
            </div>
            <p>Êtes-vous sûr de vouloir effectuer cette action ?</p>
          </div>
        </div>
        <!-- Action Buttons -->
        <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
          <button (click)="message.cancel()" class="btn btn-outline-secondary">
            Annuler
          </button>
          <button (click)="message.confirm()" class="btn btn-danger">
            Confirmer
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
